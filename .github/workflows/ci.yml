name: System Biblioteczny CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-java:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Konfiguracja Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Budowanie Spring Boot (Katalog)
        run: |
          cd backend/catalog-service/catalog-service
          mvn clean package -DskipTests

  build-react:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Konfiguracja Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/library-web/package-lock.json

      - name: Instalacja zależności i budowanie
        run: |
          cd frontend/library-web
          npm ci
          npm run build
