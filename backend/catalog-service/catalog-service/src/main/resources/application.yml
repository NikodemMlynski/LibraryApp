spring:
  application:
    name: catalog-service
  datasource:
    url: ${CATALOG_DB_URL}
    username: ${CATALOG_DB_USER}
    password: ${CATALOG_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/auth/realms/library-system/protocol/openid-connect/certs
server:
  port: 8081
