server {
    listen 80;

    # Frontend React (Vite) - ZAWSZE MUSI BYĆ NA KOŃCU PLIKU (fallback)
    location /auth/ {
        proxy_pass http://keycloak:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Lending Service
    location /api/lending/ {
        proxy_pass http://lending-service:8000/api/lending/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Java Payment Service (Spring Boot na porcie 8082)
    location /api/payments/ {
        proxy_pass http://payment-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI Notify Service
    location /api/notify/ {
        proxy_pass http://notify-service:8000/;
        proxy_set_header Host $host;
    }

    # FastAPI Analytics Service
    location /api/analytics/ {
        proxy_pass http://analytics-service:8000/;
        proxy_set_header Host $host;
    }

    # Frontend React (Vite)
    location / {
        proxy_pass http://library-web:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Wsparcie dla Hot Reload w Vite (WebSockets)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Java Catalog Service
    location /api/catalog/ {
        proxy_pass http://catalog-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}