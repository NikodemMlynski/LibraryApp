services:
  # ---------------- INFRASTRUKTURA ---------------- #

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Dodajemy Healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    env_file:             # <--- DODAJEMY TO
      - .env              # <---
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: ${KEYCLOAK_DB_URL}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ../backend/identity-service/realm-export.json:/opt/keycloak/data/import/realm.json

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - library-web
      - lending-service
      - payment-service
      - notify-service
      - analytics-service
      - keycloak

  # ---------------- FRONTEND ---------------- #
  library-web:
    build:
      context: ../frontend/library-web
      dockerfile: Dockerfile
    volumes:
      - ../frontend/library-web:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  # ---------------- BACKEND SERWISY ---------------- #
  lending-service:
    build:
      context: ../backend/lending-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8002:8000" # Zostawiamy port 8002 na zewnątrz, żebyś mógł testować prosto z Postmana (localhost:8002)
    depends_on:
      - db
      - keycloak
      - catalog-service

  lending-celery-worker:
    build:
      context: ../backend/lending-service
      dockerfile: Dockerfile
    command: celery -A lending_project worker -l info
    env_file:
      - .env
    volumes:
      - ../backend/lending-service:/app
    depends_on:
      - db
      - redis

  lending-celery-beat:
    build:
      context: ../backend/lending-service
      dockerfile: Dockerfile
    command: celery -A lending_project beat -l info
    env_file:
      - .env
    volumes:
      - ../backend/lending-service:/app
    depends_on:
      - db
      - redis

  payment-service:
    build:
      context: ../backend/payment-service
      dockerfile: Dockerfile
    volumes:
      - ../backend/payment-service:/app
    depends_on:
      - db

  notify-service:
    build:
      context: ../backend/notify-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8003:8000"
    volumes:
      - ../backend/notify-service:/app
    depends_on:
      - db

  analytics-service:
    build:
      context: ../backend/analytics-service
      dockerfile: Dockerfile
    volumes:
      - ../backend/analytics-service:/app
    depends_on:
      - db

  # Catalog Service (Java) zakomentowany na później
  catalog-service:
    build:
      context: ../backend/catalog-service/catalog-service
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
